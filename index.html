<style>
body {
  margin:0;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;

  background:url('icon.png') no-repeat center center fixed;
  background-size:cover;
}

/* OSCURECER FONDO */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
}

/* CONTENIDO */
.wrapper {
  position:relative;
  z-index:1;
  width:90%;
  max-width:400px;
}

/* BOTONES */
.btn {
  display:block;
  padding:20px;
  margin:15px 0;
  border-radius:12px;
  text-decoration:none;
  color:white;
  font-size:20px;
  text-align:center;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.2);
}

.btn-axon {
  border-left: 4px solid #00c8ff;
  background: linear-gradient(135deg, rgba(0,200,255,0.18), rgba(0,0,0,0.6));
  text-shadow: 0 0 10px rgba(0,200,255,0.7);
}

.btn-balistic {
  border-left: 4px solid #ff6b35;
  background: linear-gradient(135deg, rgba(255,107,53,0.18), rgba(0,0,0,0.6));
  text-shadow: 0 0 10px rgba(255,107,53,0.7);
}

.btn-armament {
  border-left: 4px solid #7fff6b;
  background: linear-gradient(135deg, rgba(127,255,107,0.18), rgba(0,0,0,0.6));
  text-shadow: 0 0 10px rgba(127,255,107,0.7);
}
</style>
</head>

<body>

<div class="wrapper">

</a>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}

let tiempoOculto = null;

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    tiempoOculto = Date.now();
  } else {
    if (tiempoOculto && (Date.now() - tiempoOculto) > 60000) {
      window.location.href = "https://vaxi82.github.io/launcher/";
    }
    tiempoOculto = null;
  }
});
</script>
